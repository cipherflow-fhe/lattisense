name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, gpu]
    defaults:
      run:
        shell: bash
    container:
      image: localhost:5000/lattisense-ci:latest
      options: --gpus all
      volumes:
        - /opt/heongpu-cache:/opt/heongpu-cache
        - /opt/go-mod-cache:/root/go/pkg/mod
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify prerequisites
        run: |
          g++ --version | head -1
          cmake --version | head -1
          go version
          nvcc --version | tail -1
          nvidia-smi --query-gpu=name --format=csv,noheader
          python3 --version

      - name: Configure git mirrors for China
        run: |
          git config --global url."https://gitee.com/nvidia_mirror/cccl.git".insteadOf "https://github.com/NVIDIA/cccl.git"

      - name: Build HEonGPU (cached)
        run: |
          HEONGPU_COMMIT=$(git -C HEonGPU rev-parse HEAD)
          CACHE_DIR="/opt/heongpu-cache/${HEONGPU_COMMIT}"
          if [ -d "${CACHE_DIR}/install/lib" ]; then
            echo "Using cached HEonGPU build (${HEONGPU_COMMIT:0:8})"
            cp -a "${CACHE_DIR}/install" HEonGPU/install
            cp -a "${CACHE_DIR}/build" HEonGPU/build
          else
            echo "Building HEonGPU from scratch"
            cd HEonGPU
            cmake -S . -B build \
              -DCMAKE_CUDA_ARCHITECTURES=86 \
              -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
              -DCMAKE_INSTALL_PREFIX=$(pwd)/install
            cmake --build build -j$(nproc)
            cmake --install build
            cd ..
            mkdir -p "${CACHE_DIR}"
            cp -a HEonGPU/install "${CACHE_DIR}/"
            cp -a HEonGPU/build "${CACHE_DIR}/"
            ls -dt /opt/heongpu-cache/*/ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          fi

      - name: Build SDK (CPU + GPU)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DLATTISENSE_BUILD_TESTS=ON \
            -DLATTISENSE_ENABLE_GPU=ON \
            -DLATTISENSE_CUDA_ARCH=86
          make -j$(nproc)

      - name: Generate test data
        run: |
          cd unittests
          export PYTHONPATH=$GITHUB_WORKSPACE/build/unittests:$GITHUB_WORKSPACE:$PYTHONPATH
          python3 test_cpu_bfv.py
          python3 test_cpu_ckks.py
          python3 test_gpu_bfv.py
          python3 test_gpu_ckks.py

      - name: Run CPU tests
        timeout-minutes: 20
        run: |
          cd build/unittests
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build/lib:$LD_LIBRARY_PATH
          ./test_lattigo
          ./test_mp_lattigo
          ./test_cpu_bfv
          ./test_cpu_ckks

      - name: Run GPU tests
        timeout-minutes: 20
        run: |
          cd build/unittests
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build/lib:$GITHUB_WORKSPACE/HEonGPU/install/lib:$LD_LIBRARY_PATH
          ./test_gpu_bfv
          ./test_gpu_ckks

  build-docker:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, gpu]
    defaults:
      run:
        shell: bash
    container:
      image: localhost:5000/lattisense-ci:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    needs: build-and-test
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t lattisense:latest .

      - name: Verify Docker image
        timeout-minutes: 10
        run: |
          docker run --rm lattisense:latest bash -c "
            cd /workspace/project_template
            python3 bfv_mult.py
            mkdir -p build && cd build
            cmake .. && make && cd ..
            ./build/my_fhe_app
          "

      - name: Tag and push Docker image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag lattisense:latest "${IMAGE}:latest"
          # Tag with version if this is a tag push
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            docker tag lattisense:latest "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi
          docker push "${IMAGE}:latest"

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f
